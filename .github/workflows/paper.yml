name: Paper daily

# The autonomous paper-trading pipeline (no AI in the loop): every weekday after NSE close it
# refreshes prices, marks the notional book to market, regenerates the dashboard, and commits the
# track record back to the repo. It NEVER trades — on rebalance days the dashboard flags
# "ACTION NEEDED" and a human approves the orders (`paper.py apply`).

on:
  schedule:
    # 12:23 UTC = 17:53 IST, after the 15:30 IST (10:00 UTC) close, weekdays only.
    # Deliberately OFF the top of the hour: GitHub heavily throttles on-the-hour
    # schedules under load and silently drops them (why "0 12" never fired). An
    # odd minute lands in an uncongested slot. Holidays just re-mark last close (harmless).
    - cron: "23 12 * * 1-5"
  workflow_dispatch: # allow a manual run from the Actions tab
    inputs:
      force_digest:
        description: "Also send the weekly digest now (verification)"
        type: boolean
        default: false

permissions:
  contents: write # to commit the updated book + dashboard

jobs:
  paper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"
      - name: Install deps
        run: uv sync --extra dev --frozen
      - name: Daily mark + dashboard (refreshes data; never trades)
        run: uv run python scripts/paper.py daily
      - name: Opportunity scan → Telegram alerts (edge-triggered; fail-soft, never blocks)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: >-
          uv run python scripts/scan_alerts.py
          ${{ github.event.inputs.force_digest == 'true' && '--force-digest' || '' }}
      - name: Commit the track record
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/paper/book.json data/paper/run_log.jsonl data/paper/alert_state.json reports/paper_dashboard.md reports/paper_equity.csv
          git diff --staged --quiet || git commit -m "paper: daily mark $(date -u +%F) [skip ci]"
          git push
      - name: Alert on pipeline failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: >-
          uv run python scripts/scan_alerts.py --pipeline-failed
          "Paper daily job failed — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
