# Always-on Q-Alpha dashboard. Run from the repo root:
#   docker compose -f deploy/docker-compose.yml up -d --build
# Reads secrets from ../.env (KITE_API_KEY, KITE_API_SECRET, APP_PASSWORD). The named volume keeps
# the downloaded price panels across restarts so they aren't re-fetched every boot.
services:
  dashboard:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file: ../.env
    ports:
      - "8501:8501"
    volumes:
      - qalpha-data:/app/data
    restart: unless-stopped

volumes:
  qalpha-data:
